<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Ex3 - Lighting and Shadows</title>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      // Import THREE and all functions from kitchen-utils.js
      import * as THREE from 'three';
      import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm';
      import { 
        initScene, 
        initLighting, 
        loadTextures, 
        createRoom, 
        createObjects, 
        createRobot,
        animate, 
        getRenderer,
        getScene
      } from './js/kitchen-utils.js';

      // Initialize the scene - same as ex2
      initScene();
      initLighting();
      loadTextures();
      createRoom();
      const objects = createObjects();
      const robot = createRobot(); 
      const scene = getScene();
      const renderer = getRenderer();

      // 1. Setting up the ambient light to create soft and realistic shadows
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Soft white light with half intensity
      getScene().add(ambientLight);

      // 2. Adding a main light source using Spotlight for "ceiling lamp" effect
      const spotlight = new THREE.SpotLight(0xffffff, 1); // Bright white spotlight
      spotlight.position.set(0, 5, 0); // Position it above the center
      spotlight.angle = Math.PI / 4; // Set the angle of the spotlight cone
      spotlight.penumbra = 0.2; // Soft edges for the spotlight
      spotlight.decay = 2; // Light decay over distance
      spotlight.distance = 10; // Maximum range of the spotlight
      spotlight.castShadow = true; // Enable shadows

      // Shadow properties for better quality
      spotlight.shadow.mapSize.set(1024, 1024); // Shadow map width and height
      spotlight .shadow.bias = -0.0001; // Reduce shadow acne
      
      scene.add(spotlight);

      // Set the spotlight to target the robot's torso for better lighting on the robot
      spotlight.target.position.set(-0.5, 1, 0); 
      scene.add(spotlight.target); 

      // 3, 4. Material's properties checking - using MeshStandardMaterial for better light interaction
      // Shadows casting and receiving 
      // This is already enabled in the previous exercises when creating the robot, but we can ensure shadows are enabled
      renderer.shadowMap.enabled = true; // Enable shadow mapping in the renderer
      renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Use soft shadows for better realism

      // 5. Material/lights properties control
      const gui = new GUI();
      
      // Light controls
      const lightFolder = gui.addFolder('Light');
      lightFolder.add(spotlight, 'intensity', 0, 5);
      lightFolder.add(spotlight.position, 'x', -5, 5);
      lightFolder.add(spotlight.position, 'y', 0, 10);
      lightFolder.add(spotlight.position, 'z', -5, 5);

      
      // Robot material controls
      const materialFolder = gui.addFolder('Robot Material');
      materialFolder.add(robot.torso.material, 'roughness', 0, 1);
      materialFolder.add(robot.torso.material, 'metalness', 0, 1);
      materialFolder.addColor({ color: robot.torso.material.color.getHex() }, 'color').onChange((value) => {
        robot.torso.material.color.setHex(value);
        robot.head.material.color.setHex(value);
      });

      // Object positioning controls
      const objectsFolder = gui.addFolder('Objects Position');
      
      const cuttingBoardFolder = objectsFolder.addFolder('Cutting Board');
      cuttingBoardFolder.add(objects.cuttingBoard.position, 'x', -3, 3).step(0.1);
      cuttingBoardFolder.add(objects.cuttingBoard.position, 'y', 0, 4).step(0.1);
      cuttingBoardFolder.add(objects.cuttingBoard.position, 'z', -3, 3).step(0.1);

      const pizzaFolder = objectsFolder.addFolder('Pizza');
      pizzaFolder.add(objects.pizza.position, 'x', -3, 3).step(0.1);
      pizzaFolder.add(objects.pizza.position, 'y', 0, 4).step(0.1);
      pizzaFolder.add(objects.pizza.position, 'z', -3, 3).step(0.1);

      // Start animation loop
      renderer.setAnimationLoop(animate);
    </script>
  </body>
</html>
